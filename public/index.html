<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Away We Go Podcast - F1 Prediction Tracker 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">F1</div>
        <div>
          <h1 class="brand-title">Away We Go Podcast</h1>
          <p class="brand-subtitle">2026 F1 Prediction Tracker</p>
        </div>
      </div>
      <div id="user-area" class="user-area"></div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav" id="main-nav">
    <button class="nav-btn active" data-view="calendar">Calendar</button>
    <button class="nav-btn" data-view="leaderboard">Leaderboard</button>
    <button class="nav-btn" data-view="my-predictions">My Predictions</button>
    <button class="nav-btn" data-view="settings">Settings</button>
  </nav>

  <!-- Main Content -->
  <main class="main" id="app">

    <!-- Signup Modal -->
    <div id="signup-modal" class="modal" style="display:none">
      <div class="modal-content">
        <h2>Play: Away We Go Podcast - F1 Predictions</h2>
        <p>Pick a username to start making your F1 predictions</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" placeholder="Enter your username" required minlength="2" maxlength="30" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="signup-email">Email <span class="label-hint">(optional - for race reminders)</span></label>
            <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="signup-email-optin">
              Send me race weekend reminders
            </label>
          </div>
          <div id="signup-error" class="error-msg" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full">Start Predicting</button>
        </form>
      </div>
    </div>

    <!-- Calendar View -->
    <div id="view-calendar" class="view">
      <h2 class="view-title">2026 Formula 1 World Championship Calendar</h2>
      <div id="race-list" class="race-list"></div>
    </div>

    <!-- Prediction View -->
    <div id="view-prediction" class="view" style="display:none">
      <button class="btn btn-back" id="btn-back-calendar">&larr; Back to Calendar</button>
      <div id="prediction-content"></div>
    </div>

    <!-- Leaderboard View -->
    <div id="view-leaderboard" class="view" style="display:none">
      <h2 class="view-title">Leaderboard</h2>
      <div id="leaderboard-content"></div>
    </div>

    <!-- My Predictions View -->
    <div id="view-my-predictions" class="view" style="display:none">
      <h2 class="view-title">My Predictions</h2>
      <div id="my-predictions-content"></div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view" style="display:none">
      <h2 class="view-title">Settings</h2>
      <div id="settings-content"></div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Away We Go Podcast &mdash; F1 Prediction Tracker</p>
    <p><a href="/admin" class="footer-link">Admin Panel</a></p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
