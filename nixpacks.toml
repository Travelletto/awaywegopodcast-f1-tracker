[phases.setup]
nixPkgs = ["fontconfig", "dejavu_fonts"]

[phases.build]
cmds = ["mkdir -p fonts && find /nix/store -name 'DejaVuSans.ttf' -path '*dejavu*' 2>/dev/null | head -1 | xargs -I{} cp {} fonts/ ; find /nix/store -name 'DejaVuSans-Bold.ttf' -path '*dejavu*' 2>/dev/null | head -1 | xargs -I{} cp {} fonts/"]
